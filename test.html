<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Landing Page</title>

  <!-- Google Font -->
  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Landing Page</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px;
      max-width: 700px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      animation: fadeIn 1s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .highlight {
      color: #38bdf8;
    }

    p {
      font-size: 1.1rem;
      color: #cbd5e1;
      margin-bottom: 35px;
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.03);
      background: #0ea5e9;
      box-shadow: 0 10px 20px rgba(14, 165, 233, 0.5);
    }

    .book-icon {
      font-size: 70px;
      margin-bottom: 20px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      .container {
        padding: 35px 25px;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="book-icon">📘</div>

    <h1>
      This is a book about
      <span class="highlight">__</span>
      by
      <span class="highlight">__</span>
    </h1>

    <p>
      Explore the complete documentation and download the full PDF version below.
    </p>

    <a class="btn"
       href="documents/10672713.pdf"
       download="10672713.pdf">
       Download PDF
    </a>
  </div>

</body>
</html>
