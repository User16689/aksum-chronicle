<!DOCTYPE html>
<html lang="en">

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Landing Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: #111318;
      color: #f5e6c8;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Top red gradient background */
    .top-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 45%;
      background:
        linear-gradient(
          135deg,
          #5a1717 0%,
          #7c2222 40%,
          #8d2b2b 100%
        );
      z-index: 0;
    }

    /* Gold top line */
    .top-line {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 3px;
      background: #d4a63d;
      border-radius: 20px;
      z-index: 1;
    }

    /* Gold diamond */
    .diamond {
      position: absolute;
      top: 1px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 14px;
      height: 14px;
      background: #d4a63d;
      z-index: 2;
    }

    .container {
      position: relative;
      z-index: 3;

      width: 90%;
      max-width: 750px;

      background: rgba(20, 20, 20, 0.92);

      border: 1px solid rgba(212, 166, 61, 0.2);

      border-radius: 20px;

      padding: 60px 50px;

      text-align: center;

      box-shadow:
        0 10px 40px rgba(0,0,0,0.5),
        0 0 25px rgba(212,166,61,0.08);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 25px;
      line-height: 1.2;
      color: #f8e7c5;
    }

    .highlight {
      color: #d4a63d;
    }

    p {
      color: #d2c3a5;
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      padding: 15px 32px;

      background: linear-gradient(
        135deg,
        #d4a63d,
        #b8862f
      );

      color: #1a1a1a;
      text-decoration: none;
      font-weight: bold;

      border-radius: 12px;

      transition: all 0.3s ease;

      box-shadow:
        0 5px 15px rgba(212,166,61,0.25);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow:
        0 8px 20px rgba(212,166,61,0.4);
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 2rem;
      }

      .container {
        padding: 40px 25px;
      }

      p {
        font-size: 1rem;
      }
    }

  </style>
</head>

<body>

  <div class="top-bg"></div>
  <div class="top-line"></div>
  <div class="diamond"></div>

  <div class="container">

    <div class="icon">📕</div>

    <h1>
      This is a book about a comprehensive Biography of Ras alula and his exploits
      <span class="highlight">__</span>
      by Haggai Erlich
      <span class="highlight">__</span>
    </h1>

    <p>
      Download the complete documentation and PDF version below.
    </p>

    <a
      class="btn"
      href="./documents/10672713.pdf"
      download
    >
      Download PDF
    </a>

  </div>

</body>
</html>
