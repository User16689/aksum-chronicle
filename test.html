<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Landing Page</title>

  <!-- Google Font -->
  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Landing Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 50px;
      width: 100%;
      max-width: 700px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .highlight {
      color: #38bdf8;
    }

    p {
      color: #d1d5db;
      font-size: 1.1rem;
      margin-bottom: 35px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 15px 30px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      .container {
        padding: 30px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="icon">📘</div>

    <h1>
      This is a book about
      <span class="highlight">__</span>
      by
      <span class="highlight">__</span>
    </h1>

    <p>
      Download the complete PDF documentation below.
    </p>

    <a
      class="btn"
      href="./documents/10672713.pdf"
      download
    >
      Download PDF
    </a>

  </div>

</body>
</html>
